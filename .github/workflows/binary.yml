name: Binary

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential libgmp-dev

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

  build:
    name: Build
    runs-on: ${{ matrix.runner-os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner-os: ubuntu-latest
          - target: aarch64-apple-darwin
            runner-os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential libgmp-dev

      - name: Install toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install gmp

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-
            cargo-${{ runner.os }}-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: pow-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pow
          retention-days: 1